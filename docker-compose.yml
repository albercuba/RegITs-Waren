services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
      - data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  uploads:
  data:
