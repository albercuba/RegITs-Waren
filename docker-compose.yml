services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8081,http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      - uploads:/app/uploads
      - data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  uploads:
  data:
